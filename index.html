<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Closing Bartender</title>

<style>

*{
box-sizing:border-box;
font-family:Poppins,sans-serif;
margin:0;
padding:0;
}

body{
background:#f5f5f5;
padding:20px;
}

.card{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h2{
text-align:center;
margin-bottom:25px;
}

.top{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
margin-bottom:25px;
}

@media(max-width:700px){
.top{
grid-template-columns:1fr;
}
}

input,select{
padding:12px;
width:100%;
border:1px solid #ddd;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#222;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.qty{
width:80px;
}

button{
width:100%;
padding:15px;
background:#16a34a;
color:white;
border:none;
border-radius:12px;
margin-top:20px;
cursor:pointer;
font-size:16px;
}

button:disabled{
opacity:.6;
}

</style>
</head>

<body>

<div class="card">

<h2>
🍹 Closing Bartender
</h2>


<div class="top">

<div>
<label>Tanggal</label>
<input type="date" id="tanggal">
</div>

<div>
<label>Shift</label>

<select id="shift">

<option value="">
Pilih Shift
</option>

<option>
Shift 1
</option>

<option>
Shift 2
</option>

</select>

</div>


<div>

<label>
Nama Petugas
</label>

<input
id="petugas"
placeholder="Masukkan nama">

</div>

</div>



<table>

<thead>

<tr>

<th>
Barang
</th>

<th>
Keluar
</th>

</tr>

</thead>


<tbody id="listBarang">

</tbody>

</table>



<button
id="btnSimpan"
onclick="simpan()">

💾 Simpan Closing

</button>


</div>


<script>

const SCRIPT_URL=
"https://script.google.com/macros/s/AKfycbxhTABxX2_EaxWWe3RC-7kCHCUjJcAJM5Hn61MO2fXdHV62ETiWwHFDyXpyxML_U6T5/exec";


const barang=[

"ALPUKAT FROZ",
"MANGGA GOLEK/GADUNG",
"JERUK PERAS",
"MELON FROZ",
"WHIP CREAM",
"BERAS"

];


let html="";

barang.forEach((b,i)=>{

html+=`

<tr>

<td>
${b}
</td>

<td>

<input
type="number"
value="0"
min="0"
id="qty${i}"
class="qty">

</td>

</tr>

`;

});

document.getElementById(
"listBarang"
).innerHTML=
html;




async function simpan(){

if(!document.getElementById("tanggal").value){
alert("Isi tanggal");
return;
}

if(!document.getElementById("shift").value){
alert("Pilih shift");
return;
}

if(!document.getElementById("petugas").value){
alert("Isi nama");
return;
}


let data={

tanggal:
document.getElementById("tanggal").value,

shift:
document.getElementById("shift").value,

petugas:
document.getElementById("petugas").value,

barang:
barang.map((b,i)=>({

barang:b,

qty:
document.getElementById(
`qty${i}`
).value

}))

};


try{

let response=
await fetch(
SCRIPT_URL,
{
method:"POST",
body:
JSON.stringify(data),
headers:{
"Content-Type":
"application/json"
},
mode:"cors"
}
);

console.log(
response.status
);


let hasil=
await response.text();

console.log(
hasil
);

alert(
hasil
);

location.reload();

}

catch(err){

console.error(err);

alert(
"Gagal:\n"+
err.message
);

}

}

</script>

</body>
</html>
