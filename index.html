<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Closing Bartender</title>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;

}


body{

background:#f5f5f5;

padding:20px;

}


.card{

max-width:1000px;

margin:auto;

background:white;

padding:25px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(
0,0,0,.08
);

}


h2{

text-align:center;

margin-bottom:25px;

}


.top{

display:grid;

grid-template-columns:
1fr 1fr 1fr;

gap:15px;

margin-bottom:25px;

}


@media(max-width:700px){

.top{

grid-template-columns:
1fr;

}

}


input,
select{

padding:12px;

width:100%;

border:

1px solid #ddd;

border-radius:10px;

}


table{

width:100%;

border-collapse:
collapse;

}


th{

background:#222;

color:white;

padding:12px;

}


td{

padding:10px;

border-bottom:

1px solid #eee;

text-align:center;

}


.qty{

width:90px;

}


button{

width:100%;

padding:15px;

background:

#16a34a;

color:white;

border:none;

border-radius:12px;

font-size:16px;

margin-top:20px;

cursor:pointer;

}


button:disabled{

opacity:.6;

}

</style>

</head>



<body>


<div class="card">


<h2>

🍹 Closing Bartender

</h2>



<div class="top">


<div>

<label>

Tanggal

</label>

<input

type="date"

id="tanggal"

>

</div>



<div>

<label>

Shift

</label>

<select id="shift">

<option value="">

Pilih Shift

</option>


<option>

Shift 1

</option>


<option>

Shift 2

</option>

</select>

</div>



<div>

<label>

Nama Petugas

</label>


<input

id="petugas"

placeholder=
"Masukkan nama"

>


</div>


</div>




<table>


<thead>

<tr>

<thead>
<tr>
<th>Barang</th>
<th>Satuan</th>
<th>Keluar</th>
</tr>
</thead>


</tr>

</thead>



<tbody

id="listBarang"

>

</tbody>


</table>




<button

id="btnSimpan"

onclick=
"simpan()"

>

💾 Simpan Closing

</button>



</div>




<script>


const SCRIPT_URL=

"https://script.google.com/macros/s/AKfycbxhTABxX2_EaxWWe3RC-7kCHCUjJcAJM5Hn61MO2fXdHV62ETiWwHFDyXpyxML_U6T5/exec";



const barang=[

{nama:"ALPUKAT FROZ", satuan:"PCS"},
{nama:"MANGGA GOLEK/GADUNG", satuan:"KG"},
{nama:"JERUK PERAS", satuan:"PCS"},
{nama:"MELON FROZ", satuan:"PCS"},
{nama:"WHIP CREAM", satuan:"PCS"},
{nama:"NANGKA FROZ", satuan:"PCS"},
{nama:"STRAWBERRY FROZ", satuan:"PCS"},
{nama:"SIRSAK FROZ", satuan:"PCS"},
{nama:"BUAH NAGA", satuan:"PCS"},
{nama:"BUAH SEMANGKA", satuan:"PCS"},
{nama:"SIRUP LYCHE", satuan:"PCS"},
{nama:"SIRUP MANGGA", satuan:"PCS"},
{nama:"SIRUP MELON", satuan:"PCS"},
{nama:"BUAH LECI", satuan:"PCS"},
{nama:"LYCHEETEA", satuan:"PCS"},
{nama:"RED VELVET", satuan:"PCS"},
{nama:"MATCHA", satuan:"PCS"},
{nama:"CHOCOLATE", satuan:"PCS"},
{nama:"COOKIES&CREAM", satuan:"PCS"},
{nama:"LEMONTEA", satuan:"PCS"},
{nama:"VANILLA", satuan:"PCS"},
{nama:"THAITEA", satuan:"PCS"},
{nama:"TARO", satuan:"PCS"},
{nama:"BUBBLEGUM", satuan:"PCS"},
{nama:"SKM", satuan:"PCS"},
{nama:"UHT", satuan:"PCS"},
{nama:"GLAZE COKLAT", satuan:"PCS"},
{nama:"ZODA", satuan:"PCS"},
{nama:"NATADECOCO", satuan:"PCS"},
{nama:"GELAS 16OZ", satuan:"PCS"},
{nama:"GELAS PAHE 11OZ", satuan:"PCS"},
{nama:"SEAL MINUMAN", satuan:"PCS"},
{nama:"KERTAS NASI COKLAT", satuan:"PCS"},
{nama:"KERTAS NASI PUTIH", satuan:"PCS"},
{nama:"KERTAS PRINT BESAR", satuan:"PCS"},
{nama:"KERTAS PRINT KECIL", satuan:"PCS"},
{nama:"SENDOK TAKE-AWAY", satuan:"PCS"},
{nama:"SENDOK JASUKE", satuan:"PCS"},
{nama:"THINWALL 500ML", satuan:"PCS"},
{nama:"THINWALL 300ML", satuan:"PCS"},
{nama:"THINWALL 650ML", satuan:"PCS"},
{nama:"WADAH JASUKE 200ML", satuan:"PCS"},
{nama:"KOTAK (L)", satuan:"PCS"},
{nama:"KOTAK (M)", satuan:"PCS"},
{nama:"SEDOTAN STD", satuan:"PCS"},
{nama:"SEDOTAN BOBA", satuan:"PCS"},
{nama:"WADAH SAMBAL 35ML", satuan:"PCS"},
{nama:"PLASTIK ES BATU", satuan:"PCS"},
{nama:"KRESEK S15", satuan:"PCS"},
{nama:"KRESEK S21", satuan:"PCS"},
{nama:"KRESEK S24", satuan:"PCS"},
{nama:"KRESEK GELAS", satuan:"PCS"},
{nama:"CETIK 8x12", satuan:"PCS"},
{nama:"CETIK 7x12", satuan:"PCS"},
{nama:"SUNLIGHT JERIGEN", satuan:"PCS"},
{nama:"BERAS", satuan:"PCS"}

];



let html="";


barang.forEach((b,i)=>{
  html+=`
    <tr>
      <td>${b.nama}</td>
      <td>${b.satuan}</td>
      <td>
        <input
          type="number"
          min="0"
          value="0"
          id="qty${i}"
          class="qty"
        >
      </td>
    </tr>
  `;
});


document.getElementById(

"listBarang"

).innerHTML=

html;






async function simpan(){


let btn=

document.getElementById(

"btnSimpan"

);



if(

!document.getElementById(

"tanggal"

).value

){

alert(

"Isi tanggal"

);

return;

}



if(

!document.getElementById(

"shift"

).value

){

alert(

"Pilih shift"

);

return;

}



if(

!document.getElementById(

"petugas"

).value

){

alert(

"Isi nama"

);

return;

}





let barangTerisi=


barang.map((b,i)=>({

barang:b,


qty:

parseInt(

document.getElementById(

`qty${i}`

).value

)||0


}))


.filter(

item=>

item.qty>0

);




if(

barangTerisi.length==0

){

alert(

"Isi minimal 1 qty"

);

return;

}



let data={


tanggal:

document.getElementById(

"tanggal"

).value,


shift:

document.getElementById(

"shift"

).value,


petugas:

document.getElementById(

"petugas"

).value,


barang:

barangTerisi


};



btn.disabled=true;


btn.innerHTML=

"⏳ Menyimpan...";




try{


await fetch(

SCRIPT_URL,

{

method:

"POST",


body:

JSON.stringify(

data

),


headers:{

"Content-Type":

"application/json"

},


mode:

"no-cors"

}


);



btn.innerHTML=

"✅ Berhasil";


alert(

"Data berhasil disimpan"

);


setTimeout(()=>{


location.reload();


},1000);



}catch(err){


alert(

"Gagal\n"+

err.message

);


btn.disabled=false;


btn.innerHTML=

"💾 Simpan Closing";


}



}



</script>

</body>
</html>
